version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flowforge']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: pnpm migrate:up
    environment:
      DATABASE_URL: postgres://flowforge:flowforge_dev@postgres:5432/flowforge
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVICE: api
      DATABASE_URL: postgres://flowforge:flowforge_dev@postgres:5432/flowforge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVICE: orchestrator
      DATABASE_URL: postgres://flowforge:flowforge_dev@postgres:5432/flowforge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      PORT: 3002
    ports:
      - '3002:3002'
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVICE: worker
      DATABASE_URL: postgres://flowforge:flowforge_dev@postgres:5432/flowforge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      PORT: 3003
    ports:
      - '3003:3003'
    depends_on:
      api:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVICE: scheduler
      DATABASE_URL: postgres://flowforge:flowforge_dev@postgres:5432/flowforge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      PORT: 3004
    ports:
      - '3004:3004'
    depends_on:
      api:
        condition: service_healthy

  realtime:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SERVICE: realtime
      DATABASE_URL: postgres://flowforge:flowforge_dev@postgres:5432/flowforge
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
